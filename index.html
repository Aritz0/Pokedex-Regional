<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pokédex Hoenn</title>

<!-- FAVICON: mini Pokédex/Pokéball como icono de la pestaña -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='3' y='3' width='26' height='26' rx='5' fill='%23e3350d' stroke='%237a1206' stroke-width='2'/><circle cx='11' cy='11' r='5' fill='%231e90ff' stroke='%23fff' stroke-width='1.5'/><circle cx='9.5' cy='9.5' r='1.5' fill='%23bfefff'/><circle cx='20' cy='9' r='1.6' fill='%23ff4d4d'/><circle cx='24' cy='9' r='1.6' fill='%23ffe14d'/><rect x='8' y='19' width='16' height='7' rx='2' fill='%2378c850' stroke='%232f4f2f' stroke-width='1.5'/></svg>">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="brand">

        <!-- LENTE AZUL -->
        <span class="lens"></span>

        <!-- LUCES LED -->
        <span class="leds">
            <span class="led red"></span>
            <span class="led yellow"></span>
            <span class="led green"></span>
        </span>

        <!-- TÍTULO -->
        <h2 class="title"><a href="index.html">POKÉDEX HOENN</a></h2>

    </div>
</header>

<div class="container">

    <!-- LISTA POKÉMON -->
    <div class="list">

        <!-- BUSCADOR + BOTONES -->
        <div class="topbar">
            <input
                type="text"
                id="search"
                class="search"
                placeholder="Buscar nombre o nº..."
            >
            <button id="randomBtn" class="icon-btn" title="Aleatorio">🎲</button>
            <button id="shinyBtn" class="shiny-btn">✨ Shiny: OFF</button>
        </div>

        <!-- FILTRO POR TIPO -->
        <select id="typeFilter" class="type-filter">
            <option value="">Todos los tipos</option>
        </select>

        <!-- CONTADOR -->
        <div id="count" class="count"></div>

        <!-- LISTA DINÁMICA -->
        <div id="list"></div>

    </div>

    <!-- PANEL DEX -->
    <div class="dex">

        <div class="screen">

            <!-- PANTALLA DE BIENVENIDA -->
            <div id="welcome" class="welcome">
                <div class="pokeball"></div>
                <p>Selecciona un Pokémon<br>de la lista</p>
            </div>

            <!-- DETALLE DEL POKÉMON (oculto al inicio) -->
            <div id="detail" class="detail hidden">

                <!-- NOMBRE + GRITO -->
                <div class="name-row">
                    <h2 id="name"></h2>
                    <button id="cryBtn" class="cry-btn" title="Escuchar grito">🔊</button>
                </div>

                <!-- SPRITE -->
                <img id="img" alt="pokemon">

                <!-- TIPOS -->
                <div id="types"></div>

                <!-- DESCRIPCIÓN -->
                <p id="desc"></p>

                <!-- INFO EXTRA: habilidades, debilidades, total -->
                <div id="info"></div>

                <!-- EVOLUCIONES -->
                <div id="evo"></div>

                <!-- STATS -->
                <div id="stats"></div>

                <!-- AUDIO DEL GRITO (oculto) -->
                <audio id="cry"></audio>

            </div>

        </div>

    </div>

</div>

<!-- JS -->
<script src="js/pokedex.js"></script>

</body>
</html>
